PACKAGE_NAME="linux-ai"
PACKAGE_VERSION="1.0"

# Build via kbuild directly (bypasses Makefile's `uname -r` KDIR, which is wrong
# for DKMS — DKMS builds for a *target* kernel that may not be the running one).
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Three independent modules (no inter-module symbol deps).
BUILT_MODULE_NAME[0]="proc_linux_ai"
BUILT_MODULE_NAME[1]="nf_linux_ai"
BUILT_MODULE_NAME[2]="usb_linux_ai"

DEST_MODULE_LOCATION[0]="/updates/dkms"
DEST_MODULE_LOCATION[1]="/updates/dkms"
DEST_MODULE_LOCATION[2]="/updates/dkms"

# Auto-rebuild + install on every kernel upgrade.
AUTOINSTALL="yes"
