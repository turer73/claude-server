<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Linux-AI Server</title>
<style>
:root { --bg: #0a0a0f; --surface: #12121a; --card: #1a1a28; --border: #2a2a3e; --text: #e2e2ef; --dim: #8888aa; --accent: #a78bfa; --accent2: #7c3aed; --user: #3b82f6; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 15px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; font-size: 11px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: #22c55e; }
.status-dot.err { background: #ef4444; }
.btn-sm { background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.active { background: var(--accent2); color: white; border-color: var(--accent2); }
.session-id { color: var(--dim); font-size: 10px; font-family: monospace; }

.messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user { background: var(--user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.claude { background: var(--card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.claude .label { font-size: 10px; color: var(--accent); font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
.msg.claude .label .cost { color: var(--dim); font-weight: 400; }
.msg.system { background: transparent; border: 1px dashed var(--border); color: var(--dim); align-self: center; font-size: 11px; text-align: center; max-width: 500px; }
.msg code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.msg pre { background: #000; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; font-size: 11px; }
.msg pre code { background: none; padding: 0; }
.typing { display: flex; gap: 4px; padding: 6px 14px; }
.typing span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; flex-shrink: 0; }
.input-row { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; }
.input-row textarea { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 140px; }
.input-row textarea:focus { border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--dim); }
.send-btn { background: var(--accent2); color: white; border: none; padding: 0 18px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; }
.send-btn:hover { background: var(--accent); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-hint { font-size: 10px; color: var(--dim); text-align: center; margin-top: 4px; }

.login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 340px; text-align: center; }
.login-box h2 { font-size: 18px; margin-bottom: 8px; }
.login-box p { font-size: 12px; color: var(--dim); margin-bottom: 16px; }
.login-box input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; margin-bottom: 10px; }
.login-box button { width: 100%; background: var(--accent2); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Claude Code</h2>
    <p>Linux-AI Server</p>
    <input type="password" id="loginKey" placeholder="API Key" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Giris</button>
  </div>
</div>

<div class="header">
  <h1><span>Claude Code</span></h1>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText" style="color:var(--dim)"></span>
    <span class="session-id" id="sessionDisplay"></span>
    <button class="btn-sm" onclick="newSession()">Yeni Oturum</button>
    <button class="btn-sm" onclick="continueSession()">Devam Et</button>
    <button class="btn-sm" onclick="location.href='/dashboard'">Dashboard</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">Claude Code — oturum bazli chat. Onceki konusmayi hatirlayarak devam eder.</div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="promptInput" placeholder="Claude'a bir gorev verin..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendPrompt()">→</button>
  </div>
  <div class="input-hint">Enter = gonder · Shift+Enter = yeni satir · Oturum otomatik devam eder</div>
</div>

<script>
const API = location.origin + '/api/v1';
let TOKEN = localStorage.getItem('lai_token') || '';
let SESSION_ID = localStorage.getItem('claude_session_id') || null;

function H() { return { 'Authorization': 'Bearer ' + TOKEN }; }
function J() { return { ...H(), 'Content-Type': 'application/json' }; }

async function doLogin() {
  const key = document.getElementById('loginKey').value.trim();
  if (!key) return;
  try {
    const r = await fetch(API + '/auth/token', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({api_key: key}),
    });
    const d = await r.json();
    if (d.access_token) {
      TOKEN = d.access_token;
      localStorage.setItem('lai_token', TOKEN);
      document.getElementById('loginOverlay').style.display = 'none';
      checkStatus();
    } else { alert('Gecersiz API key'); }
  } catch(e) { alert('Baglanti hatasi'); }
}

if (TOKEN) {
  document.getElementById('loginOverlay').style.display = 'none';
  checkStatus();
}

async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(API + '/claude/status', { headers: H() });
    const d = await r.json();
    dot.className = 'status-dot ' + (d.available && d.authenticated ? 'ok' : 'err');
    txt.textContent = d.version || d.error || '';
  } catch(e) {
    dot.className = 'status-dot err';
    txt.textContent = 'Baglanti hatasi';
  }
  updateSessionDisplay();
}

function updateSessionDisplay() {
  const el = document.getElementById('sessionDisplay');
  el.textContent = SESSION_ID ? SESSION_ID.slice(0, 8) + '...' : 'yeni oturum';
}

function newSession() {
  SESSION_ID = null;
  localStorage.removeItem('claude_session_id');
  document.getElementById('messages').innerHTML = '<div class="msg system">Yeni oturum baslatildi.</div>';
  updateSessionDisplay();
}

function continueSession() {
  if (!SESSION_ID) {
    addMsg('system', 'Devam edilecek oturum yok. Bir mesaj gonderin.');
    return;
  }
  addMsg('system', 'Oturum devam ediyor: ' + SESSION_ID.slice(0, 8));
}

function addMsg(role, content, cost) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'claude') {
    const costStr = cost ? '$' + cost.toFixed(4) : '';
    div.innerHTML = '<div class="label"><span>Claude</span><span class="cost">' + costStr + '</span></div>' + formatMd(content);
  } else if (role === 'user') {
    div.textContent = content;
  } else {
    div.textContent = content;
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg claude'; div.id = 'typing';
  div.innerHTML = '<div class="label">Claude</div><div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function removeTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

function formatMd(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  const ta = e.target; ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
}

async function sendPrompt() {
  const input = document.getElementById('promptInput');
  const btn = document.getElementById('sendBtn');
  const prompt = input.value.trim();
  if (!prompt) return;

  addMsg('user', prompt);
  input.value = ''; input.style.height = 'auto';
  btn.disabled = true;
  addTyping();

  try {
    const body = { prompt };
    if (SESSION_ID) {
      body.session_id = SESSION_ID;
    }

    const r = await fetch(API + '/claude/run', {
      method: 'POST', headers: J(),
      body: JSON.stringify(body),
    });

    removeTyping();
    const d = await r.json();

    // Save session for continuity
    if (d.session_id) {
      SESSION_ID = d.session_id;
      localStorage.setItem('claude_session_id', SESSION_ID);
      updateSessionDisplay();
    }

    if (d.ok && d.result) {
      addMsg('claude', d.result, d.cost);
    } else if (d.error) {
      addMsg('claude', '⚠️ ' + d.error);
    } else if (d.result) {
      addMsg('claude', '⚠️ ' + d.result, d.cost);
    } else {
      addMsg('claude', '⚠️ Bos yanit');
    }
  } catch(e) {
    removeTyping();
    addMsg('system', 'Hata: ' + e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
