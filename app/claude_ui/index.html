<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Linux-AI Server</title>
<style>
:root { --bg: #0a0a0f; --surface: #12121a; --card: #1a1a28; --border: #2a2a3e; --text: #e2e2ef; --dim: #8888aa; --accent: #a78bfa; --accent2: #7c3aed; --user: #3b82f6; --claude: #a78bfa; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 16px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: #22c55e; }
.status-dot.err { background: #ef4444; }
.status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }
.btn-sm { background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user { background: var(--user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.claude { background: var(--card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.claude .label { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
.msg.system { background: transparent; border: 1px dashed var(--border); color: var(--dim); align-self: center; font-size: 12px; text-align: center; max-width: 500px; }
.msg code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.msg pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 12px; }
.msg pre code { background: none; padding: 0; }
.typing { display: flex; gap: 4px; padding: 8px 16px; }
.typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

/* Input */
.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 20px; flex-shrink: 0; }
.input-row { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
.input-row textarea { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 12px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 48px; max-height: 160px; }
.input-row textarea:focus { border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--dim); }
.send-btn { background: var(--accent2); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; }
.send-btn:hover { background: var(--accent); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-hint { font-size: 11px; color: var(--dim); text-align: center; margin-top: 6px; }

/* Login */
.login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 360px; text-align: center; }
.login-box h2 { font-size: 20px; margin-bottom: 8px; }
.login-box p { font-size: 13px; color: var(--dim); margin-bottom: 20px; }
.login-box input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px; }
.login-box button { width: 100%; background: var(--accent2); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🤖 Claude Code</h2>
    <p>Linux-AI Server uzerinden erisim</p>
    <input type="password" id="loginKey" placeholder="API Key" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Giris</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>🤖 <span>Claude Code</span></h1>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText" style="color:var(--dim)">Kontrol ediliyor...</span>
    <button class="btn-sm" onclick="clearChat()">Temizle</button>
    <button class="btn-sm" onclick="location.href='/dashboard'">Dashboard</button>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="msg system">Claude Code CLI uzerinden AI destekli gelistirme. Komutlar Klipper sunucusunda calisir.</div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea id="promptInput" placeholder="Claude'a bir soru sorun veya gorev verin..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendPrompt()">→</button>
  </div>
  <div class="input-hint">Enter = gonder · Shift+Enter = yeni satir</div>
</div>

<script>
const API = location.origin + '/api/v1';
let TOKEN = localStorage.getItem('lai_token') || '';

function H() { return { 'Authorization': 'Bearer ' + TOKEN }; }
function J() { return { ...H(), 'Content-Type': 'application/json' }; }

// Login
function doLogin() {
  TOKEN = document.getElementById('loginKey').value.trim();
  if (!TOKEN) return;
  localStorage.setItem('lai_token', TOKEN);
  document.getElementById('loginOverlay').style.display = 'none';
  checkStatus();
}

if (TOKEN) {
  document.getElementById('loginOverlay').style.display = 'none';
  checkStatus();
}

// Status
async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const r = await fetch(API + '/claude/status', { headers: H() });
    const d = await r.json();
    if (d.available && d.authenticated) {
      dot.className = 'status-dot ok';
      txt.textContent = d.version;
    } else if (d.available) {
      dot.className = 'status-dot err';
      txt.textContent = 'API key eksik';
    } else {
      dot.className = 'status-dot err';
      txt.textContent = d.error || 'CLI bulunamadi';
    }
  } catch(e) {
    dot.className = 'status-dot err';
    txt.textContent = 'Baglanti hatasi';
  }
}

// Chat
function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'claude') {
    div.innerHTML = '<div class="label">Claude</div>' + formatMd(content);
  } else {
    div.textContent = content;
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg claude';
  div.id = 'typing';
  div.innerHTML = '<div class="label">Claude</div><div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function formatMd(text) {
  // Basic markdown: code blocks, inline code, bold
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
  // Auto-resize
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

async function sendPrompt() {
  const input = document.getElementById('promptInput');
  const btn = document.getElementById('sendBtn');
  const prompt = input.value.trim();
  if (!prompt) return;

  addMsg('user', prompt);
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addTyping();

  try {
    const r = await fetch(API + '/claude/stream', {
      method: 'POST',
      headers: J(),
      body: JSON.stringify({ prompt }),
    });

    removeTyping();
    const msgDiv = addMsg('claude', '');
    let fullText = '';

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const msg = JSON.parse(data);

          // Handle different message types from claude stream-json
          if (msg.type === 'assistant' && msg.message?.content) {
            for (const block of msg.message.content) {
              if (block.type === 'text') {
                fullText += block.text;
              } else if (block.type === 'tool_use') {
                fullText += `\n\`[${block.name}]\`\n`;
              }
            }
          } else if (msg.type === 'content_block_delta' && msg.delta?.text) {
            fullText += msg.delta.text;
          } else if (msg.type === 'result') {
            if (msg.result && !fullText) {
              fullText = msg.result;
            }
            if (msg.is_error) {
              fullText = '⚠️ ' + (msg.result || 'Hata olustu');
            }
          }

          msgDiv.innerHTML = '<div class="label">Claude</div>' + formatMd(fullText);
          msgDiv.scrollIntoView({ behavior: 'smooth' });
        } catch {}
      }
    }

    if (!fullText) {
      msgDiv.innerHTML = '<div class="label">Claude</div><em style="color:var(--dim)">Bos yanit</em>';
    }
  } catch(e) {
    removeTyping();
    addMsg('system', 'Hata: ' + e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="msg system">Chat temizlendi.</div>';
}
</script>
</body>
</html>
