services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      # localhost only - host process (linux-ai-server) hits via 127.0.0.1
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /data/qdrant:/qdrant/storage
    healthcheck:
      # Qdrant readiness endpoint — no auth, lightweight
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
