server:
  host: "0.0.0.0"
  port: 8420
  workers: 2
  debug: false

auth:
  # jwt_secret: Set via JWT_SECRET env var
  token_expiry_hours: 24
  api_key_enabled: true

database:
  path: "/var/lib/linux-ai-server/server.db"

logging:
  level: "INFO"
  file: "/var/log/linux-ai-server/server.log"

security:
  rate_limit: 100
  allowed_origins:
    - "http://localhost:8420"
    - "http://localhost:3000"
    - "https://panola.app"
    - "https://petvet.panola.app"
    - "https://kuafor.panola.app"
    # Internal IPs: set via CORS_EXTRA_ORIGINS env var
