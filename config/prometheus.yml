# Prometheus configuration for linux-ai-server
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "linux-ai-server"
    static_configs:
      - targets: ["host.docker.internal:8420"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
    scrape_interval: 15s
