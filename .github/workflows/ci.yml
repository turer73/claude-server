name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  # PR'larda eski-run iptal (runner tasarrufu); master'da iptal ETME (default-branch
  # run tamamlansin -> hizli-ardisik merge'de yanlis 'canceled' kirmizi olmasin).
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/
      - name: Cron OUTCOME-contract lint (LIVESYS-SENSE)
        run: bash tools/lint-cron-outcome.sh

  # mypy RATCHET: PR'da EKLENEN+DEĞİŞEN (diff-filter=AM) her app/scripts .py dosyasında,
  # PR-versiyonunun hata sayısı base-versiyondan FAZLA olamaz. Eklenen dosya (base=0) →
  # strict-temiz şart (eski #88-sınıfı sessiz-MCP-kırığını yakalar). Mevcut dosyaya dokunan
  # PR borcu ARTIRAMAZ, azaltabilir → 393-hata legacy-borcu monoton düşer, geri sızmaz.
  # (Eski davranış yalnız diff-filter=A idi → mevcut-dosyaya eklenen yeni-kod kapsanmıyordu.)
  mypy-ratchet:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: mypy ratchet (eklenen=strict-temiz, değişen=borç-artmaz)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only --diff-filter=AM "$base" HEAD | grep -E '^(app|scripts)/.*\.py$' || true)
          if [ -z "$files" ]; then
            echo "app/scripts .py değişikliği yok — mypy-ratchet atlandı."
            exit 0
          fi
          cnt() { mypy --follow-imports=silent "$1" 2>&1 | grep -c ': error:' || true; }
          fail=0
          for f in $files; do
            pr=$(cnt "$f")
            if git cat-file -e "$base:$f" 2>/dev/null; then
              tmp="/tmp/mypybase_$(echo "$f" | tr '/.' '__').py"
              git show "$base:$f" > "$tmp"
              old=$(cnt "$tmp"); rm -f "$tmp"
            else
              old=0
            fi
            if [ "$pr" -gt "$old" ]; then
              echo "::error file=$f::mypy-strict borç ARTTI ($old→$pr). Değişen dosyada yeni tip-hatası ekleme (mevcut borç azaltılabilir, artırılamaz)."
              mypy --follow-imports=silent "$f" 2>&1 | grep ': error:' | head -25
              fail=1
            else
              echo "✓ $f: $old→$pr"
            fi
          done
          exit $fail

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Prod 3.14 calisir; CI'i 3.11 (taban) + 3.14 (prod) ikisinde de kos.
        # 3.12+ davranis farklari (tarfile filter/PEP706 vb) yakalanir.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install 'bandit[toml]'
      - run: bandit -c pyproject.toml -r app/ -ll -x app/mcp/

  kernel-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: make -C kernel lint

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          # Docker Hub pull-timeout (buildkit boot + base-image cekme) intermittent
          # build-fail -> false-RED yapiyordu (alti job yesilken build kirmizi).
          # docker.io pull'lari mirror.gcr.io uzerinden gecsin (daha guvenilir).
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: linux-ai-server:test
          # GHA layer cache: tekrar-build'de Docker Hub bagimliligini dusurur.
          cache-from: type=gha
          cache-to: type=gha,mode=max
