name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  # PR'larda eski-run iptal (runner tasarrufu); master'da iptal ETME (default-branch
  # run tamamlansin -> hizli-ardisik merge'de yanlis 'canceled' kirmizi olmasin).
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/
      - name: Cron OUTCOME-contract lint (LIVESYS-SENSE)
        run: bash tools/lint-cron-outcome.sh

  # P0-d (surer): mypy strict YALNIZ PR'da YENİ-EKLENEN .py dosyalarında (diff-filter=A).
  # NEDEN sadece-eklenen: legacy dosyalar 570-hata içeriyor; 'değişen-dosya tüm-dosya' onları
  # düzenleyince patlardı. Eklenen-yeni-modül tip-temiz olmalı (#88-sınıfı sessiz-MCP-kırığını
  # yakalar). Mevcut-dosyaya eklenen yeni-kod kapsanmaz (bilinen-boşluk → baseline gelecek-iş).
  mypy-changed:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: mypy (yeni-eklenen dosyalar, strict)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only --diff-filter=A "$base" HEAD | grep -E '^(app|scripts)/.*\.py$' || true)
          if [ -z "$files" ]; then
            echo "Yeni-eklenen .py yok — mypy atlandı."
            exit 0
          fi
          echo "mypy (değişen dosyalar):"; echo "$files"
          mypy --follow-imports=silent $files

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Prod 3.14 calisir; CI'i 3.11 (taban) + 3.14 (prod) ikisinde de kos.
        # 3.12+ davranis farklari (tarfile filter/PEP706 vb) yakalanir.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install 'bandit[toml]'
      - run: bandit -c pyproject.toml -r app/ -ll -x app/mcp/

  kernel-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: make -C kernel lint

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          # Docker Hub pull-timeout (buildkit boot + base-image cekme) intermittent
          # build-fail -> false-RED yapiyordu (alti job yesilken build kirmizi).
          # docker.io pull'lari mirror.gcr.io uzerinden gecsin (daha guvenilir).
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: linux-ai-server:test
          # GHA layer cache: tekrar-build'de Docker Hub bagimliligini dusurur.
          cache-from: type=gha
          cache-to: type=gha,mode=max
