# Linux-AI Server log rotation (kaynak-of-truth — git versiyonlu).
# Deploy: sudo cp automation/logrotate-linux-ai-server.conf /etc/logrotate.d/linux-ai-server
# Test:   sudo logrotate --debug /etc/logrotate.d/linux-ai-server   (dry-run)
#
# NOT: Tüm yazıcılar append-per-event/per-run (persistent open-handle YOK) →
# `create` güvenli (copytruncate gerekmez). Service journald'a loglar, bu dosyalara değil.

# Cron job stdout/stderr (klipper-cron-wrap.sh per-job) — yüksek günlük hacim
/var/log/linux-ai-server/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 klipperos klipperos
    sharedscripts
    postrotate
        # No service restart needed — logs are appended, not held open
    endscript
}

# Test-runner günlük log + fail snapshot'ları.
# NOT: /opt/.../logs/ group/world-writable → logrotate güvenlik-gardı "insecure
# parent" diye ATLAR. `su` directive'i şart (bu stanza SESSİZCE çalışmıyordu →
# 75 test-runner dosyası birikmişti). su = rotation'ı bu user/group olarak yap.
/opt/linux-ai-server/logs/*.log {
    su klipperos klipperos
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 klipperos klipperos
}

# klipper-event.sh systemd/cron event log — düşük hacim, append-only (rotation
# YOKTU: 1.3M birikmiş, sadece elle bir kez arşivlenmiş). Haftalık VEYA 5M'de döndür.
# su: /opt/.../data/ de world/group-writable → insecure-parent gardını aş.
/opt/linux-ai-server/data/klipper-event.log {
    su klipperos klipperos
    weekly
    maxsize 5M
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0644 klipperos klipperos
}
